<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placeholder Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ffffff;
            font-weight: 300;
            letter-spacing: 2px;
        }

        p {
            font-size: 18px;
            color: #cccccc;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            margin: 10px;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid #ffffff;
        }

        .btn:hover {
            background-color: transparent;
            color: #ffffff;
        }

        .btn-secondary {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
        }

        .btn-secondary:hover {
            background-color: #ffffff;
            color: #000000;
        }

        .footer {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid #333333;
            font-size: 14px;
            color: #666666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Coming Soon</h1>
        <p>This page is under construction. Check back soon for updates and exciting content!</p>
        <div>
            <a href="index.html" class="btn">Home</a>
            <a href="#" class="btn btn-secondary">Learn More</a>
        </div>
        <div class="footer">
            <p>&copy; 2026. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
